name: cafe_project
description: "Aplikasi pencarian cafe terbaik dengan Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.4.2
  image_picker: ^1.1.2
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
